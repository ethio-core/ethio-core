apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: ethio-core
  labels:
    app: transaction-service
    version: v1
spec:
  replicas: 5
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
    spec:
      serviceAccountName: ethio-core-sa
      containers:
        - name: transaction-service
          image: ethio-core/transaction-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
              name: http
          envFrom:
            - configMapRef:
                name: ethio-core-config
            - secretRef:
                name: ethio-core-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: ethio-core
spec:
  selector:
    app: transaction-service
  ports:
    - port: 8004
      targetPort: 8004
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transaction-service-hpa
  namespace: ethio-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transaction-service
  minReplicas: 5
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
