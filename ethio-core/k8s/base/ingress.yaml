apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ethio-core-ingress
  namespace: ethio-core
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.ethio-core.com
        - portal.ethio-core.com
      secretName: ethio-core-tls
  rules:
    - host: api.ethio-core.com
      http:
        paths:
          - path: /api/v1/identity
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8001
          - path: /api/v1/biometric
            pathType: Prefix
            backend:
              service:
                name: biometric-service
                port:
                  number: 8002
          - path: /api/v1/card
            pathType: Prefix
            backend:
              service:
                name: card-service
                port:
                  number: 8003
          - path: /api/v1/transaction
            pathType: Prefix
            backend:
              service:
                name: transaction-service
                port:
                  number: 8004
          - path: /api/v1/security
            pathType: Prefix
            backend:
              service:
                name: security-service
                port:
                  number: 8005
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: sso-service
                port:
                  number: 8006
          - path: /api/v1/events
            pathType: Prefix
            backend:
              service:
                name: event-store-service
                port:
                  number: 8010
    - host: portal.ethio-core.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ethio-core-sa
  namespace: ethio-core
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ethio-core-role
  namespace: ethio-core
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ethio-core-rolebinding
  namespace: ethio-core
subjects:
  - kind: ServiceAccount
    name: ethio-core-sa
    namespace: ethio-core
roleRef:
  kind: Role
  name: ethio-core-role
  apiGroup: rbac.authorization.k8s.io
