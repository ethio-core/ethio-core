apiVersion: v1
kind: Secret
metadata:
  name: ethio-core-secrets
  namespace: ethio-core
type: Opaque
stringData:
  # Database credentials - CHANGE IN PRODUCTION
  POSTGRES_USER: "ethio_admin"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Keys - Generate new keys for production
  JWT_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_ACTUAL_PUBLIC_KEY
    -----END PUBLIC KEY-----
  
  # Encryption keys
  AES_ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_KEY_FOR_PROD"
  HMAC_SECRET_KEY: "CHANGE_ME_SECRET_KEY_FOR_PROD"
  
  # External API Keys
  FAYDA_API_KEY: "YOUR_FAYDA_API_KEY"
  FAYDA_API_SECRET: "YOUR_FAYDA_API_SECRET"
  
  # SMS Provider
  SMS_API_KEY: "YOUR_SMS_API_KEY"
  
  # Email Provider  
  SMTP_PASSWORD: "YOUR_SMTP_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: ethio-core-tls
  namespace: ethio-core
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  tls.crt: "REPLACE_WITH_BASE64_ENCODED_CERT"
  tls.key: "REPLACE_WITH_BASE64_ENCODED_KEY"
