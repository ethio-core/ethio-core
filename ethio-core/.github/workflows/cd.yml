name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: |
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig

      - name: Update image tags
        run: |
          export IMAGE_TAG=${{ github.sha }}
          envsubst < k8s/overlays/staging/kustomization.yaml > k8s/overlays/staging/kustomization.yaml.tmp
          mv k8s/overlays/staging/kustomization.yaml.tmp k8s/overlays/staging/kustomization.yaml

      - name: Deploy to staging
        run: |
          export KUBECONFIG=./kubeconfig
          kubectl apply -k k8s/overlays/staging/
          
          # Wait for deployments
          kubectl -n ethio-core-staging rollout status deployment/identity-service --timeout=300s
          kubectl -n ethio-core-staging rollout status deployment/biometric-service --timeout=300s
          kubectl -n ethio-core-staging rollout status deployment/card-service --timeout=300s
          kubectl -n ethio-core-staging rollout status deployment/transaction-service --timeout=300s
          kubectl -n ethio-core-staging rollout status deployment/security-service --timeout=300s
          kubectl -n ethio-core-staging rollout status deployment/sso-service --timeout=300s
          kubectl -n ethio-core-staging rollout status deployment/frontend-service --timeout=300s

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add actual smoke test commands here
          sleep 30
          curl -f https://staging-api.ethio-core.com/health || echo "Health check pending..."

      - name: Notify deployment
        run: |
          echo "Staging deployment completed successfully!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig

      - name: Create backup
        run: |
          echo "Creating database backup before deployment..."
          # Add database backup commands

      - name: Deploy to production (Blue-Green)
        run: |
          export KUBECONFIG=./kubeconfig
          export IMAGE_TAG=${{ github.sha }}
          
          # Deploy green environment
          kubectl apply -k k8s/overlays/production/
          
          # Wait for green deployments
          kubectl -n ethio-core rollout status deployment/identity-service --timeout=600s
          kubectl -n ethio-core rollout status deployment/biometric-service --timeout=600s
          kubectl -n ethio-core rollout status deployment/card-service --timeout=600s
          kubectl -n ethio-core rollout status deployment/transaction-service --timeout=600s
          kubectl -n ethio-core rollout status deployment/security-service --timeout=600s
          kubectl -n ethio-core rollout status deployment/sso-service --timeout=600s
          kubectl -n ethio-core rollout status deployment/frontend-service --timeout=600s

      - name: Run production tests
        run: |
          echo "Running production verification tests..."
          sleep 60
          curl -f https://api.ethio-core.com/health || exit 1

      - name: Notify production deployment
        run: |
          echo "Production deployment completed successfully!"

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-production]
    environment: production
    
    steps:
      - name: Rollback production
        run: |
          echo "Rolling back production deployment..."
          export KUBECONFIG=./kubeconfig
          kubectl -n ethio-core rollout undo deployment/identity-service
          kubectl -n ethio-core rollout undo deployment/biometric-service
          kubectl -n ethio-core rollout undo deployment/card-service
          kubectl -n ethio-core rollout undo deployment/transaction-service
          kubectl -n ethio-core rollout undo deployment/security-service
          kubectl -n ethio-core rollout undo deployment/sso-service
          kubectl -n ethio-core rollout undo deployment/frontend-service
          echo "Rollback completed!"
