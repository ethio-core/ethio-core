name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - m1-identity
          - m2-biometric
          - m3-card
          - m4-transaction
          - m5-security
          - m6-sso
          - event-store
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: modules/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov black flake8 mypy

      - name: Lint with flake8
        working-directory: modules/${{ matrix.service }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Format check with black
        working-directory: modules/${{ matrix.service }}
        run: black --check .

      - name: Type check with mypy
        working-directory: modules/${{ matrix.service }}
        run: mypy . --ignore-missing-imports || true

      - name: Run tests
        working-directory: modules/${{ matrix.service }}
        run: |
          pytest tests/ -v --cov=. --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: modules/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/m7-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: modules/m7-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check || true

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --coverage || true

  security-scan:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        service:
          - name: m1-identity
            context: modules/m1-identity
            port: 8001
          - name: m2-biometric
            context: modules/m2-biometric
            port: 8002
          - name: m3-card
            context: modules/m3-card
            port: 8003
          - name: m4-transaction
            context: modules/m4-transaction
            port: 8004
          - name: m5-security
            context: modules/m5-security
            port: 8005
          - name: m6-sso
            context: modules/m6-sso
            port: 8006
          - name: m7-frontend
            context: modules/m7-frontend
            port: 3000
          - name: event-store
            context: event-store
            port: 8010

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_PORT=${{ matrix.service.port }}

  notify:
    runs-on: ubuntu-latest
    needs: [build-images]
    if: always()
    
    steps:
      - name: Notify on success
        if: needs.build-images.result == 'success'
        run: |
          echo "Build successful! Images pushed to registry."

      - name: Notify on failure
        if: needs.build-images.result == 'failure'
        run: |
          echo "Build failed! Check the logs."
          exit 1
