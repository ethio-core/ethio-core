version: '3.8'

services:
  # PostgreSQL - Event Store
  postgres:
    image: postgres:15-alpine
    container_name: ethio-core-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ethio_core}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./event-store/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Sessions
  redis:
    image: redis:7-alpine
    container_name: ethio-core-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector Database for Biometric Templates
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ethio-core-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO - Document Storage
  minio:
    image: minio/minio:latest
    container_name: ethio-core-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Module 1: Identity & KYC Service
  m1-identity:
    build: ./modules/m1-identity
    container_name: ethio-core-m1-identity
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ethio_core
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Module 2: Biometric & AI Service
  m2-biometric:
    build: ./modules/m2-biometric
    container_name: ethio-core-m2-biometric
    ports:
      - "8002:8002"
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Module 3: Card Management Service
  m3-card:
    build: ./modules/m3-card
    container_name: ethio-core-m3-card
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ethio_core
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Module 4: Transaction Engine
  m4-transaction:
    build: ./modules/m4-transaction
    container_name: ethio-core-m4-transaction
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ethio_core
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Module 5: Security & Audit
  m5-security:
    build: ./modules/m5-security
    container_name: ethio-core-m5-security
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ethio_core
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Module 6: Federated SSO
  m6-sso:
    build: ./modules/m6-sso
    container_name: ethio-core-m6-sso
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ethio_core
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Module 7: Frontend - Digital Wallet
  m7-frontend:
    build: ./modules/m7-frontend
    container_name: ethio-core-m7-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - m1-identity
      - m2-biometric
      - m3-card
      - m4-transaction
      - m5-security
      - m6-sso

  # Nginx - API Gateway
  nginx:
    image: nginx:alpine
    container_name: ethio-core-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - m1-identity
      - m2-biometric
      - m3-card
      - m4-transaction
      - m5-security
      - m6-sso
      - m7-frontend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  default:
    name: ethio-core-network
